services:
  app_perpus:
    build:
      context: .
      dockerfile: Dockerfile
    image: perpus_dev
    container_name: perpus_app
    pull_policy: never
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www/html
    depends_on:
      db_perpus:
        condition: service_healthy
    networks:
      - perpus-network

  db_perpus:
    image: mariadb
    container_name: perpus_db
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: admin123
      MARIADB_DATABASE: perpus
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mariadb
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - perpus-network

volumes:
  mysql-data:

networks:
  perpus-network:
    driver: bridge